name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y scons build-essential libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly libgstreamer-plugins-base1.0-dev libasound2-dev libgstreamer-plugins-bad1.0-dev libc6-dev-i386 xclip xsel libjpeg-dev

    - name: Build with Buildozer
      uses: ArtemSanya/buildozer-action@v1
      with:
        command: buildozer -v android debug
        buildozer_version: master

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Accessible-Calculator-APK
        path: bin/*.apk
kapk


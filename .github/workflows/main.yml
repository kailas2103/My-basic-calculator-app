steps:
  - name: Checkout source
    uses: actions/checkout@v4

  - name: Build with Buildozer
    uses: ArtemSBulgakov/buildozer-action@v1
    with:
      command: buildozer android debug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: calculator-apk
      path: bin/*.apk
